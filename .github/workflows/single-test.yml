#            test_case: test/registered/ascend/dlm_models/test_npu_sdar_30b_a3b_chat.py
#            test_type: 'function'
#          - name: test_npu_gpt_j_6b
#            runner: linux-aarch64-a3-2
#            test_case: test/registered/ascend/llm_models/test_npu_gpt_j_6b.py
#            test_type: 'function'
#          - name: test_npu_kimi_liner_48b_a3b_instruct
